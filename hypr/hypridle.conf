# hypridle configuration
# Manages idle timeouts for screen lock and display power management

general {
    lock_cmd = pidof hyprlock || hyprlock          # lock command
    before_sleep_cmd = loginctl lock-session       # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on     # turn on display after resume
}

# 5 minutes: lock screen
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 10 minutes: turn off monitor display
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
