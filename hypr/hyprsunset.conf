# hyprsunset configuration
# Automatically toggles display temperature between day and night

# Set maximum allowed gamma
max-gamma = 150

# Daytime profile: disables blue-light filter
profile {
    time = 07:00
    identity = true
}

# Nighttime profile: applies warm temperature and light gamma adjustment
profile {
    time = 20:00
    temperature = 4200
    gamma = 0.9
}
